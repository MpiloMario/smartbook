<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login - SmartBook</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme=color" content="#4f46e5">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center h-screen bg-mauve-900">

<div class="bg-white p-8 rounded-xl shadow-lg w-96">
    <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
    <input id="email" type="email" placeholder="Email"
        class="w-full mb-4 px-4 py-2 border rounded-lg">

    <input id="password" type="password" placeholder="Password"
        class="w-full mb-6 px-4 py-2 border rounded-lg">

    <button id="loginBtn"
        class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-royal-500 ">
        Login
    </button>
    <p class="text-sm text-center mt-4">
        Don’t have an account?
    <a href="register.html" class="text-indigo-600">Register</a>
</p>
</div>
<script type="module" src="scripts/login.js"></script>
</body>
</html>
